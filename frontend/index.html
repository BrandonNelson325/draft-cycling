<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" href="/logo.png" />
    <link rel="apple-touch-icon" href="/logo.png" />
    <link rel="canonical" href="https://draftcycling.com" />

    <!-- Primary Meta -->
    <title>Draft — AI Cycling Coach | Adaptive Training Plans & Strava Integration</title>
    <meta name="description" content="Draft is your personal AI cycling coach. Get adaptive training plans, structured workouts with power targets, Strava auto-sync, and real-time coaching — all for $9.99/mo." />
    <meta name="keywords" content="cycling coach, AI cycling, training plan, Strava integration, structured workouts, FTP, power training, cycling training, bike coach, zwift workouts" />
    <meta name="author" content="Draft Cycling" />
    <meta name="robots" content="index, follow" />
    <meta name="theme-color" content="#0f172a" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://draftcycling.com" />
    <meta property="og:title" content="Draft — AI Cycling Coach | Adaptive Training Plans" />
    <meta property="og:description" content="Your personal AI cycling coach. Adaptive training plans, Strava auto-sync, structured workouts with power targets, and real-time coaching advice." />
    <meta property="og:image" content="https://draftcycling.com/logo.png" />
    <meta property="og:site_name" content="Draft Cycling" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://draftcycling.com" />
    <meta name="twitter:title" content="Draft — AI Cycling Coach" />
    <meta name="twitter:description" content="Adaptive training plans, Strava integration, and real-time AI coaching for cyclists. Start your free 7-day trial." />
    <meta name="twitter:image" content="https://draftcycling.com/logo.png" />

    <!-- Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "Draft",
      "description": "AI-powered cycling coach with adaptive training plans, Strava integration, and structured workouts.",
      "applicationCategory": "SportsApplication",
      "operatingSystem": "Web, iOS, Android",
      "offers": {
        "@type": "Offer",
        "price": "9.99",
        "priceCurrency": "USD",
        "description": "Monthly subscription with 7-day free trial"
      },
      "aggregateRating": {
        "@type": "AggregateRating",
        "ratingValue": "4.8",
        "ratingCount": "1"
      }
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
